<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- 支付宝蓝色圆角背景 -->
  <rect width="96" height="96" rx="16" fill="#1677FF"/>
  <!-- 白色"支"字（支付宝核心标志，居中显示） -->
  <!-- 使用路径精确绘制"支"字 -->
  <g fill="white" transform="translate(20, 18)">
    <!-- 支字第一笔：横 -->
    <rect x="8" y="4" width="40" height="5" rx="2.5"/>
    <!-- 支字第二笔：竖 -->
    <rect x="24" y="4" width="6" height="42" rx="3"/>
    <!-- 支字第三笔：撇（左） -->
    <path d="M30 14 Q18 30 16 50" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- 支字第四笔：捺（右） -->
    <path d="M30 14 Q48 32 52 50" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
