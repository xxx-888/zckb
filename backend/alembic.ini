# =============================================================================
# Alembic Configuration - Review Platform Backend
# =============================================================================

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'revision' command.
# This is useful for auto-generating migrations based on model changes.
# Note: requires sqlalchemy>=2.0 and the use of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
# This is generally not recommended.
sourceless = false

# The version location specification.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator (OS-dependent).
# version_path_separator = os

# The output encoding used when revision files are written from script.py.mako.
# output_encoding = utf-8

# The database URL is loaded from the environment variable.
# This is set in alembic/env.py via the config attribute.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/review_platform_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
